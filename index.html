<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSCraft</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="crosshair">+</div>

  <div id="hotbar"></div>

  <div id="inventory-overlay" class="hidden">
    <div id="inventory-panel">
      <div id="inv-tabs-container"></div>
      
      <div id="inv-content"></div>
      
      <div id="inv-hotbar-section">
        <div class="inv-label">Hotbar</div>
        <div id="inv-hotbar-slots"></div>
      </div>
    </div>
  </div>

  <div id="keybind-overlay" class="hidden">
    <div id="keybind-panel">
      <h2>Keybinds</h2>
      <div id="keybind-list"></div>
      <button id="keybind-close">Close</button>
    </div>
  </div>

  <div id="pause-overlay" class="hidden">
    <div id="pause-panel">
      <h2>Paused</h2>
      <button id="resume-btn">Resume</button>
    </div>
  </div>

  <div id="debug-info"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
